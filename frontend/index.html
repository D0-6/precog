<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRECOG | Pre-Incident Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "surface-container": "#E5E7EB",
                    "surface-bright": "#FFFFFF",
                    "primary": "#111827", // Deep Slate / Black
                    "primary-dark": "#000000",
                    "tertiary": "#111827",
                    "on-surface-variant": "#4B5563",
                    "on-primary": "#ffffff",
                    "secondary-container": "#F3F4F6",
                    "surface-variant": "#F9FAFB",
                    "on-surface": "#111827",
                    "on-secondary": "#ffffff",
                    "on-secondary-container": "#374151",
                    "error-container": "#FEE2E2",
                    "outline": "#9CA3AF",
                    "error": "#DC2626",
                    "background": "#F9FAFB",
                    "surface": "#FFFFFF",
                    "secondary": "#374151",
                },
                "borderRadius": {
                    "DEFAULT": "0px",
                    "lg": "0px",
                    "xl": "0px",
                    "full": "0px" // Sharp edges everywhere
                },
                "spacing": {
                    "gutter": "24px",
                },
                "fontFamily": {
                    "body-sm": ["Geist", "sans-serif"],
                    "body-lg": ["Geist", "sans-serif"]
                }
            },
        },
    }
  </script>
  <style>
    body {
        background-color: #F9FAFB;
        font-family: 'Geist', sans-serif;
        -webkit-font-smoothing: antialiased;
    }
    /* Enterprise hard shadow instead of soft ghost shadow */
    .ghost-shadow { 
        box-shadow: 2px 2px 0px 0px rgba(17,24,39,0.1); 
        border: 1px solid #E5E7EB;
    }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse-soft { animation: pulse-soft 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    
    /* Utility for React recharts overrides */
    .recharts-text { fill: #4B5563 !important; font-family: 'Geist', sans-serif !important; }
    .recharts-cartesian-grid-horizontal line, .recharts-cartesian-grid-vertical line { stroke: #E5E7EB !important; }
    .recharts-tooltip-wrapper { z-index: 100; }
  </style>
</head>
<body class="bg-white text-on-surface">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
